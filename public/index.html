<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Casamento</title>
    <style>
        :root { --primary-color: #b8916d; --secondary-color: #2a9d8f; --bg-color: #faf9f6; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: #444; margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 25px; padding: 25px 15px; border-bottom: 1px solid #eee; }
        h1 { color: var(--primary-color); font-weight: 300; font-size: 2.4rem; margin: 0; }
        .subtitle { font-style: italic; color: #999; margin-top: 5px; }
        .catalog { display: grid; grid-template-columns: 1fr; gap: 30px; max-width: 1100px; margin: 0 auto; }
        @media (min-width: 768px) { .catalog { grid-template-columns: repeat(3, 1fr); } }
        .product-card { background: var(--card-bg); border-radius: 18px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); text-align: center; display: flex; flex-direction: column; transition: 0.3s; }
        .product-card:hover { transform: translateY(-8px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; }
        .buy-link { display: block; margin-bottom: 15px; color: var(--secondary-color); text-decoration: none; border: 1px solid var(--secondary-color); padding: 8px; border-radius: 6px; transition: 0.2s; }
        .buy-link:hover { background: var(--secondary-color); color: white; }
        .btn-reserve { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 1rem; margin-top: auto; transition: 0.2s; }
        .reserved-status { background-color: #f5f5f5; color: #888; padding: 12px; border-radius: 10px; font-style: italic; display: none; margin-top: auto; }
        .pix-wrapper { display: flex; justify-content: center; margin: 40px 0 60px; }
        .pix-box { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        .pix-box img { width: 180px; margin: 20px 0; border-radius: 10px; border: 1px solid #eee; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 35px; border-radius: 20px; max-width: 420px; width: 90%; }
        .modal input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <h1>Nossa Casa Nova</h1>
        <h2>💖 Alana & Lucas 💖</h2>
        <p class="subtitle">Escolha um ou mais itens para nos ajudar a montar o nosso lar</p>
    </header>

    <div class="pix-wrapper">
        <div class="pix-box">
            <h2>💖 Presente via Pix</h2>
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=f1eefd03-c2ca-4926-9c8c-5e31218bdb8e" alt="QR Code Pix">
            <p><strong>Chave:</strong> <span id="chavePix">f1eefd03-c2ca-4926-9c8c-5e31218bdb8e</span></p>
            <button onclick="copiarPix()" style="background:var(--secondary-color); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Copiar Chave</button>
        </div>
    </div>

    <div class="catalog" id="catalog"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--primary-color)">Reservar Presente</h2>
            <input type="text" id="userName" placeholder="Seu nome">
            <input type="text" id="userWhatsapp" placeholder="Seu WhatsApp (Opcional)">
            <button class="btn-reserve" id="btnConfirmar" onclick="confirmarReserva()">Confirmar Reserva</button>
            <p style="text-align:center; margin-top:15px"><a href="#" onclick="fecharModal()" style="color:#888; text-decoration:none;">Cancelar</a></p>

        function carregarProdutos() {
            const catalog = document.getElementById('catalog');
            catalog.innerHTML = '';
            listaEnxoval.forEach((prod, index) => {
                catalog.innerHTML += `
                    <div class="product-card">
                        <img src="${prod.img}" alt="${prod.nome}">
                        <h3>${prod.nome}</h3>
                        <a href="https://www.google.com/search?q=comprar+${prod.nome}" target="_blank" class="buy-link">🛍️ Onde comprar</a>
                        <button class="btn-reserve" id="btn-${index}" onclick="abrirModal(${index})">Reservar presente</button>
                        <div class="reserved-status" id="status-${index}">
                            ✅ Reservado por <span id="name-${index}"></span>
                        </div>
                    </div>`;
            });
            atualizarReservas();
        }

        function abrirModal(index) {
            itemParaReservar = index;
            document.getElementById('modal').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function confirmarReserva() {
            const nome = document.getElementById('userName').value;
            const zap = document.getElementById('userWhatsapp').value;
            if (!nome) return alert("Digite seu nome!");
            
            document.getElementById('btnConfirmar').innerText = "Enviando...";
            try {
                const res = await fetch('/api/reservar', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ itemIndex: itemParaReservar, nome: nome, whatsapp: zap })
                });
                const data = await res.json();
                if(data.success) {
                    alert("Reserva concluída!");
                    fecharModal();
                    atualizarReservas();
                } else { alert(data.message); }
            } catch (err) { alert("Erro de conexão."); }
            document.getElementById('btnConfirmar').innerText = "Confirmar Reserva";
        }

        async function atualizarReservas() {
            try {
                const res = await fetch('/api/reservas');
                const reservas = await res.json();
                
                listaEnxoval.forEach((_, i) => {
                    const b = document.getElementById(`btn-${i}`);
                    const s = document.getElementById(`status-${i}`);
                    if(b && s) { b.style.display = 'block'; s.style.display = 'none'; }
                });

                reservas.forEach(r => {
                    const b = document.getElementById(`btn-${r.itemIndex}`);
                    const s = document.getElementById(`status-${r.itemIndex}`);
                    const n = document.getElementById(`name-${r.itemIndex}`);
                    if(b && s) { b.style.display = 'none'; s.style.display = 'block'; n.innerText = r.nome; }
                });
            } catch (err) { console.error(err); }
        }

        function copiarPix() {
            navigator.clipboard.writeText(document.getElementById("chavePix").innerText);
            alert("Chave Copiada!");
        }

        carregarProdutos();
        setInterval(atualizarReservas, 5000);
    </script>

</html>
